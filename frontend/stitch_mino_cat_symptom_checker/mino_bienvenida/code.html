<script>
        // Simple interactive micro-effect: Change header scale on input focus
        const inputs = document.querySelectorAll('input');
        const header = document.querySelector('h1');

        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                header.classList.add('scale-105');
                header.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                header.classList.remove('scale-105');
            });
        });


        // Form submission effect, Data Capture & Redirect
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Evita que la página recargue por defecto

            // 1. Capturamos los valores de los inputs
            const inputDueno = document.getElementById('userName').value.trim();
            const inputMichi = document.getElementById('catName').value.trim();

            // 2. Validación rápida para que no pasen vacíos
            if (!inputDueno || !inputMichi) {
                alert("Por favor, dinos tu nombre y el de tu michi para comenzar.");
                return;
            }

            // 3. Efecto visual de carga
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;
            
            // 4. Guardamos los datos y redirigimos después de un breve momento
            setTimeout(() => {
                // Guardamos en la memoria del navegador (localStorage)
                localStorage.setItem('mino_nombre_dueno', inputDueno);
                localStorage.setItem('mino_nombre_michi', inputMichi);
                
                // Redirigimos a tu bitácora (asegúrate de que el archivo se llame así en tu carpeta)
                window.location.href = '../mino_bitacora/bitacora.html'; 
            }, 800); // 800ms es suficiente para dar la ilusión de procesamiento sin aburrir
        });    

 </script>
