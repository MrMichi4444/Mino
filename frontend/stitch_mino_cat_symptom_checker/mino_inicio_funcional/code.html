<div class="absolute -bottom-3 left-0 w-6 h-6 bg-surface-container-lowest border-l border-b border-outline-variant transform -rotate-45 -translate-x-1/2 z-[-1]"></div></div>
<div class="w-32 h-32 mt-[-32px] relative z-0 ml-lg">

                Vomitó
            </button>
<button class="symptom-chip bg-secondary-container text-on-secondary-container border border-outline-variant rounded-full py-md px-sm font-label-lg text-label-lg text-center flex items-center justify-center h-[56px]" data-selected="false" data-value="Llora mucho" onclick="toggleSymptom(this)">
                Llora mucho
            </button>
<button class="symptom-chip bg-secondary-container text-on-secondary-container border border-outline-variant rounded-full py-md px-sm font-label-lg text-label-lg text-center flex items-center justify-center h-[56px]" data-selected="false" data-value="No come" onclick="toggleSymptom(this)">
                No come
            </button>
<button class="symptom-chip bg-secondary-container text-on-secondary-container border border-outline-variant rounded-full py-md px-sm font-label-lg text-label-lg text-center flex items-center justify-center h-[56px]" data-selected="false" data-value="No bebe" onclick="toggleSymptom(this)">

</div>

</main>
<!-- Bottom Action -->
<footer class="w-full mt-auto pt-lg pb-sm">
<button class="w-full bg-primary text-on-primary rounded-xl font-label-lg text-label-lg h-[56px] flex items-center justify-center shadow-[0_4px_16px_rgba(157,62,29,0.2)] hover:bg-surface-tint active:scale-95 transition-all" onclick="evaluateSymptoms()">
            Evaluar a mi gato
        </button>
</footer>
<script>
        function toggleSymptom(button) {
            const isSelected = button.getAttribute('data-selected') === 'true';
            button.setAttribute('data-selected', !isSelected);
        }

        function evaluateSymptoms() {
            const selectedChips = document.querySelectorAll('.symptom-chip[data-selected="true"]');
            const additionalText = document.getElementById('additional-desc').value.trim();
            
            const symptoms = Array.from(selectedChips).map(chip => chip.getAttribute('data-value'));
            
            if (symptoms.length === 0 && additionalText === "") {
                alert("Por favor, selecciona al menos un síntoma o describe el problema.");
                document.getElementById('additional-desc').focus();
                return;
            }

            let fullMessage = "";
            if (symptoms.length > 0) {
                fullMessage += "Mi gato presenta los siguientes síntomas: " + symptoms.join(", ") + ". ";
            }
            if (additionalText !== "") {
                fullMessage += additionalText;
            }

            // Almacenar el mensaje para que la pantalla de chat lo use como contexto inicial
            localStorage.setItem('selectedSymptom', fullMessage);
            
            // Navegar a la pantalla de chat
            window.location.href = 'chat.html';
        }
    </script>
